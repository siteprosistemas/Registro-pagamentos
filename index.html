<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Financeiro Pro App</title>
    
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --success: #22c55e;
            --danger: #ef4444;
            --text: #f8fafc;
            --border: #334155;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        /* Container Principal Responsivo */
        .app-container {
            width: 100%;
            max-width: 1000px; /* Largura máxima para PC */
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Topo */
        .header-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card);
            padding: 15px 20px;
            border-radius: 15px;
            border: 1px solid var(--border);
        }

        .nav-btn {
            background: var(--accent);
            border: none;
            color: var(--bg);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-weight: bold;
            cursor: pointer;
        }

        #monthDisplay { font-weight: bold; color: var(--accent); font-size: 1.2rem; }

        /* Grid de Layout: No PC divide em 2 colunas */
        .main-content {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 800px) {
            .main-content { grid-template-columns: 1.5fr 1fr; }
        }

        /* Cards de Status */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .stat-card {
            background: var(--card);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--border);
        }
        .stat-card span { font-size: 0.7rem; color: #94a3b8; display: block; margin-bottom: 5px; }
        .stat-card strong { font-size: 1rem; color: var(--text); }

        /* Calendário */
        .calendar-box {
            background: var(--card);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid var(--border);
        }
        .week-header {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-size: 0.75rem;
            margin-bottom: 15px;
            color: var(--accent);
            font-weight: bold;
        }
        .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .day {
            aspect-ratio: 1/1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            border-radius: 8px;
            font-weight: bold;
        }
        .day.empty { background: transparent; }
        .day.pending { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); }
        .day.paid { background: var(--success); color: white; box-shadow: 0 4px 12px rgba(34, 197, 94, 0.2); }

        /* Lado Direito: Ações e Histórico */
        .side-panel { display: flex; flex-direction: column; gap: 20px; }

        .input-group {
            background: var(--card);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid var(--border);
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: white;
            font-size: 1rem;
        }
        button.primary {
            width: 100%;
            padding: 15px;
            border-radius: 8px;
            border: none;
            background: var(--success);
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
        }

        .history-list {
            max-height: 400px;
            overflow-y: auto;
        }
        .history-item {
            background: var(--card);
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--border);
        }
        .del-btn { background: none; border: none; color: var(--danger); cursor: pointer; }

    </style>
</head>
<body>

<div class="app-container">
    <div class="header-nav">
        <button class="nav-btn" onclick="changeMonth(-1)">❮</button>
        <span id="monthDisplay">--</span>
        <button class="nav-btn" onclick="changeMonth(1)">❯</button>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><span>Pago</span><strong id="resPaid">R$ 0</strong></div>
        <div class="stat-card"><span>Devido</span><strong id="resDue">R$ 0</strong></div>
        <div class="stat-card"><span>Falta</span><strong id="resRest" style="color:var(--accent)">R$ 0</strong></div>
    </div>

    <div class="main-content">
        <div class="calendar-box">
            <div class="week-header">
                <span>DOM</span><span>SEG</span><span>TER</span><span>QUA</span><span>QUI</span><span>SEX</span><span>SÁB</span>
            </div>
            <div class="days-grid" id="calendarGrid"></div>
        </div>

        <div class="side-panel">
            <div class="input-group">
                <label style="font-size: 0.8rem; color: #94a3b8;">Valor Semanal (R$)</label>
                <input type="number" id="weeklyInput" placeholder="0.00" onchange="saveWeekly()">
                
                <label style="font-size: 0.8rem; color: #94a3b8; margin-top: 10px; display: block;">Registrar Pagamento</label>
                <input type="number" id="payInput" placeholder="Ex: 100.00" inputmode="decimal">
                <button class="primary" onclick="doPayment()">Confirmar Pagamento</button>
            </div>

            <div class="history-list" id="historyList">
                </div>
        </div>
    </div>
</div>

<script>
    let viewDate = new Date();

    function getKey() { return `data_${viewDate.getFullYear()}_${viewDate.getMonth()}`; }
    function load() { return JSON.parse(localStorage.getItem(getKey())) || { weekly: 0, pays: [] }; }

    function saveWeekly() {
        const data = load();
        data.weekly = Math.round(parseFloat(document.getElementById('weeklyInput').value) * 100);
        localStorage.setItem(getKey(), JSON.stringify(data));
        render();
    }

    function doPayment() {
        const input = document.getElementById('payInput');
        const cents = Math.round(parseFloat(input.value) * 100);
        if (!cents) return;
        const data = load();
        data.pays.push({ amount: cents, date: Date.now() });
        localStorage.setItem(getKey(), JSON.stringify(data));
        input.value = "";
        render();
    }

    function removePay(idx) {
        const data = load();
        data.pays.splice(idx, 1);
        localStorage.setItem(getKey(), JSON.stringify(data));
        render();
    }

    function changeMonth(d) {
        viewDate.setMonth(viewDate.getMonth() + d);
        render();
    }

    function render() {
        const data = load();
        const year = viewDate.getFullYear();
        const month = viewDate.getMonth();
        
        document.getElementById('monthDisplay').innerText = 
            new Intl.DateTimeFormat('pt-BR', { month: 'long', year: 'numeric' }).format(viewDate);
        
        document.getElementById('weeklyInput').value = data.weekly ? (data.weekly / 100).toFixed(2) : "";

        const daily = Math.floor(data.weekly / 7);
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const startDay = new Date(year, month, 1).getDay();
        
        const totalPaid = data.pays.reduce((a, b) => a + b.amount, 0);
        const totalDue = daily * daysInMonth;
        const paidDays = daily > 0 ? Math.floor(totalPaid / daily) : 0;

        document.getElementById('resPaid').innerText = fmt(totalPaid);
        document.getElementById('resDue').innerText = fmt(totalDue);
        document.getElementById('resRest').innerText = fmt(Math.max(0, totalDue - totalPaid));

        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = "";

        for(let i=0; i<startDay; i++) grid.innerHTML += `<div class="day empty"></div>`;
        for(let i=1; i<=daysInMonth; i++) {
            grid.innerHTML += `<div class="day ${i <= paidDays ? 'paid' : 'pending'}">${i}</div>`;
        }

        const hist = document.getElementById('historyList');
        hist.innerHTML = "<h3 style='font-size:0.9rem; margin-bottom:10px; color:#94a3b8'>Histórico</h3>";
        [...data.pays].reverse().forEach((p, i) => {
            const realIdx = data.pays.length - 1 - i;
            hist.innerHTML += `
                <div class="history-item">
                    <div><strong>${fmt(p.amount)}</strong><br><small style="color:#64748b">${new Date(p.date).toLocaleDateString()}</small></div>
                    <button class="del-btn" onclick="removePay(${realIdx})">✕</button>
                </div>
            `;
        });
    }

    function fmt(c) { return (c/100).toLocaleString('pt-BR', {style:'currency', currency:'BRL'}); }

    render();
</script>

</body>
</html>
